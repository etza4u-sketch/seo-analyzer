<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO AI Analyzer - ניתוח SEO ואבחון בינה מלאכותית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-glow: rgba(99,102,241,0.25);
      --bg: #0b0d14;
      --bg2: #111420;
      --card: #161927;
      --card-hover: #1c2035;
      --border: #252940;
      --text: #e8ecf4;
      --text2: #8b92a8;
      --text3: #5c6380;
      --green: #10b981;
      --green-bg: rgba(16,185,129,0.12);
      --yellow: #f59e0b;
      --yellow-bg: rgba(245,158,11,0.12);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.12);
      --blue: #3b82f6;
      --blue-bg: rgba(59,130,246,0.12);
      --purple: #a855f7;
      --purple-bg: rgba(168,85,247,0.12);
      --grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      padding: 56px 20px 44px;
      text-align: center;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.10) 0%, transparent 60%);
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .logo { font-size: 2.5rem; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .tagline { color: var(--text2); font-size: 1.05rem; margin-bottom: 28px; max-width: 520px; margin-left: auto; margin-right: auto; }

    .search-wrap { max-width: 640px; margin: 0 auto; position: relative; }

    .search-row {
      display: flex;
      gap: 10px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 6px;
      transition: border-color .3s;
    }

    .search-row:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

    .search-row input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.05rem;
      padding: 12px 16px;
      outline: none;
      direction: ltr;
      text-align: left;
      font-family: inherit;
    }

    .search-row input::placeholder { color: var(--text3); }

    .btn-analyze {
      padding: 12px 32px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s;
      white-space: nowrap;
    }

    .btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--primary-glow); }
    .btn-analyze:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .examples { margin-top: 14px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .examples span { color: var(--text3); font-size: .85rem; }

    .ex-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: .82rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, color .2s;
    }

    .ex-btn:hover { background: var(--card-hover); color: var(--text); }

    /* ── Layout ── */
    .container { max-width: 1140px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Loading ── */
    .loading { display: none; text-align: center; padding: 70px 20px; }
    .loading.active { display: block; }
    .loader { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text2); }

    .error-box { display: none; background: var(--red-bg); border: 1px solid rgba(239,68,68,.3); border-radius: var(--radius); padding: 14px 20px; text-align: center; color: var(--red); margin: 20px auto; max-width: 600px; }
    .error-box.active { display: block; }

    #results { display: none; animation: fadeUp .5s ease; }
    #results.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ── URL Info Bar ── */
    .url-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .url-bar .url { color: var(--blue); font-weight: 500; direction: ltr; word-break: break-all; }
    .url-bar .badge { padding: 3px 10px; border-radius: 8px; font-size: .78rem; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-gray { background: rgba(100,116,139,.15); color: var(--text2); }

    /* ── Score Row ── */
    .score-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      transition: border-color .3s;
    }

    .score-card:hover { border-color: var(--primary); }

    .ring-wrap { width: 110px; height: 110px; margin: 0 auto 12px; position: relative; }
    .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.2s ease; }
    .ring-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.6rem; font-weight: 800; }
    .ring-val small { font-size: .7rem; font-weight: 500; color: var(--text2); }
    .score-label { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
    .score-sub { color: var(--text2); font-size: .8rem; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; overflow-x: auto; }

    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: .92rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-panel { display: none; animation: fadeUp .3s ease; }
    .tab-panel.active { display: block; }

    /* ── Cards grid ── */
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 20px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color .25s;
    }

    .card:hover { border-color: rgba(99,102,241,.3); }

    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .card-ico { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; flex-shrink: 0; }
    .card-title { font-weight: 700; font-size: 1rem; }

    .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .row:last-child { border-bottom: none; }
    .row-label { color: var(--text2); font-size: .9rem; }
    .row-value { font-weight: 600; font-size: .9rem; }

    /* ── Checks ── */
    .check { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .check:last-child { border-bottom: none; }
    .check-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-pass { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-partial { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .dot-fail { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .check-info { flex: 1; }
    .check-name { font-weight: 600; font-size: .9rem; }
    .check-tip { color: var(--text2); font-size: .82rem; }
    .check-pts { font-weight: 700; font-size: .85rem; direction: ltr; min-width: 38px; text-align: left; }

    /* ── AI Section ── */
    .ai-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .ai-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .ai-title { font-weight: 700; font-size: 1.1rem; }
    .ai-level { padding: 4px 14px; border-radius: 20px; font-size: .82rem; font-weight: 700; }

    .signal { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: rgba(255,255,255,.02); border-radius: 10px; margin-bottom: 6px; font-size: .9rem; }
    .signal-icon { font-size: 1rem; flex-shrink: 0; }
    .signal-text { flex: 1; }
    .signal-ct { color: var(--text3); font-size: .82rem; direction: ltr; }
    .signal-badge { padding: 2px 10px; border-radius: 12px; font-size: .72rem; font-weight: 600; }

    /* ── Recommendations ── */
    .recs-card {
      background: linear-gradient(135deg, rgba(99,102,241,.06), rgba(168,85,247,.06));
      border: 1px solid rgba(99,102,241,.15);
      border-radius: var(--radius);
      padding: 22px;
    }

    .recs-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 14px; }

    .rec {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px;
      background: rgba(0,0,0,.2);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: .9rem;
    }

    .rec-pr { padding: 2px 10px; border-radius: 12px; font-size: .72rem; font-weight: 700; white-space: nowrap; margin-top: 2px; }
    .pr-h { background: var(--red-bg); color: var(--red); }
    .pr-m { background: var(--yellow-bg); color: var(--yellow); }
    .pr-l { background: var(--blue-bg); color: var(--blue); }

    /* ── Export buttons ── */
    .export-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn-export {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 12px;
      font-size: .9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, background .2s;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
    }

    .btn-export:hover { transform: translateY(-1px); border-color: var(--primary); box-shadow: 0 4px 15px rgba(99,102,241,.15); }
    .btn-export svg { width: 18px; height: 18px; }

    .btn-export-primary {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
    }

    .btn-export-primary:hover { box-shadow: 0 6px 20px var(--primary-glow); border-color: transparent; }

    /* ── Competitor input ── */
    .compare-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }

    .compare-toggle label { color: var(--text2); font-size: .9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 24px;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background .3s;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      right: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform .3s;
    }

    .toggle-switch.active { background: var(--primary); }
    .toggle-switch.active::after { transform: translateX(-18px); }

    .competitor-row {
      display: none;
      gap: 10px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 6px;
      margin-top: 10px;
      transition: border-color .3s;
      align-items: center;
    }

    .competitor-row.visible { display: flex; }
    .competitor-row:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

    .competitor-row input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.05rem;
      padding: 12px 16px;
      outline: none;
      direction: ltr;
      text-align: left;
      font-family: inherit;
    }

    .competitor-row input::placeholder { color: var(--text3); }

    .vs-badge {
      background: var(--grad);
      color: #fff;
      font-weight: 800;
      font-size: .75rem;
      padding: 4px 12px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* ── Comparison table ── */
    .cmp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
      margin-bottom: 16px;
    }

    .cmp-table th {
      padding: 12px 14px;
      text-align: right;
      background: rgba(99,102,241,.08);
      font-weight: 700;
      font-size: .85rem;
      border-bottom: 2px solid var(--border);
    }

    .cmp-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .cmp-table tr:last-child td { border-bottom: none; }

    .cmp-label { color: var(--text2); font-weight: 500; }

    .cmp-winner { background: rgba(16,185,129,0.06); }

    .cmp-bar-wrap { display: flex; align-items: center; gap: 8px; }

    .cmp-bar {
      height: 8px;
      border-radius: 4px;
      transition: width .8s ease;
    }

    .cmp-bar-a { background: var(--primary); }
    .cmp-bar-b { background: var(--purple); }

    .cmp-delta {
      font-size: .78rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .cmp-delta-pos { background: var(--green-bg); color: var(--green); }
    .cmp-delta-neg { background: var(--red-bg); color: var(--red); }
    .cmp-delta-eq { background: rgba(100,116,139,.15); color: var(--text2); }

    .cmp-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .cmp-site-badge {
      padding: 5px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: .85rem;
    }

    .cmp-site-a { background: rgba(99,102,241,.12); color: var(--primary); }
    .cmp-site-b { background: var(--purple-bg); color: var(--purple); }

    .cmp-verdict {
      background: linear-gradient(135deg, rgba(16,185,129,.08), rgba(99,102,241,.08));
      border: 1px solid rgba(16,185,129,.2);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-top: 16px;
      font-size: .95rem;
    }

    .cmp-verdict strong { color: var(--green); }

    .cmp-insights { margin-top: 20px; }
    .cmp-insights-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    .insight-card {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 10px;
      transition: border-color .2s;
    }

    .insight-card:hover { border-color: rgba(99,102,241,.3); }

    .insight-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .insight-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      flex-shrink: 0;
    }

    .insight-title { font-weight: 700; font-size: .92rem; }
    .insight-tag { padding: 2px 10px; border-radius: 10px; font-size: .72rem; font-weight: 600; margin-right: auto; }

    .insight-body { font-size: .88rem; color: var(--text2); line-height: 1.7; }
    .insight-body strong { color: var(--text); }
    .insight-example { background: rgba(99,102,241,.06); border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-size: .85rem; border-right: 3px solid var(--primary); }
    .insight-example code { background: rgba(0,0,0,.3); padding: 1px 6px; border-radius: 4px; font-size: .82rem; direction: ltr; display: inline; }

    /* ── Footer ── */
    .footer { text-align: center; padding: 32px 20px; color: var(--text3); font-size: .85rem; border-top: 1px solid var(--border); }
    .footer a { color: var(--primary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .footer .copyright { margin-top: 6px; font-size: .8rem; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .logo { font-size: 2rem; }
      .score-row { grid-template-columns: 1fr 1fr; }
      .grid2 { grid-template-columns: 1fr; }
      .tabs { gap: 0; }
      .tab-btn { padding: 8px 14px; font-size: .82rem; }
      .cmp-table th, .cmp-table td { padding: 8px 10px; font-size: .82rem; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="logo">SEO AI Analyzer</div>
  <p class="tagline">כלי מתקדם לניתוח SEO ואבחון תוכן בינה מלאכותית. הזן כתובת אתר וקבל דוח מקיף תוך שניות.</p>
  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="urlInput" placeholder="example.com" dir="ltr" autocomplete="off" spellcheck="false">
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">נתח</button>
    </div>
    <div class="competitor-row" id="competitorRow">
      <input type="text" id="competitorInput" placeholder="כתובת אתר מתחרה..." dir="ltr" autocomplete="off" spellcheck="false">
      <span class="vs-badge">VS</span>
    </div>
    <div class="compare-toggle">
      <label onclick="toggleCompare()">
        <div class="toggle-switch" id="compareToggle"></div>
        <span>השווה עם מתחרה</span>
      </label>
    </div>
    <div class="examples">
      <span>דוגמאות:</span>
      <button class="ex-btn" onclick="tryUrl('https://github.com')">github.com</button>
      <button class="ex-btn" onclick="tryUrl('https://wikipedia.org')">wikipedia.org</button>
      <button class="ex-btn" onclick="tryUrl('https://google.com')">google.com</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="loading" id="loading"><div class="loader"></div><p>מנתח את האתר...</p></div>
  <div class="error-box" id="errorBox"></div>

  <div id="results">
    <!-- URL bar -->
    <div class="url-bar" id="urlBar"></div>

    <!-- Export bar -->
    <div class="export-bar" id="exportBar">
      <button class="btn-export btn-export-primary" onclick="generateReport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        ייצא דוח PDF
      </button>
      <button class="btn-export" onclick="downloadJSON()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        הורד JSON
      </button>
      <button class="btn-export" onclick="copyReport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        העתק סיכום
      </button>
    </div>

    <!-- Score rings -->
    <div class="score-row" id="scoreRow"></div>

    <!-- Tabs -->
    <div class="tabs" id="tabsBar"></div>

    <!-- Tab panels -->
    <div id="panels"></div>
  </div>
</div>

<div class="footer">
  SEO AI Analyzer &mdash; כלי ניתוח SEO ואבחון בינה מלאכותית
  <div class="copyright">&copy; 2025 <strong>רז שץ</strong> &mdash; מאמן בינה מלאכותית. כל הזכויות שמורות.</div>
</div>

<script>
const $ = id => document.getElementById(id);
let _compareMode = false;
let _competitorData = null;

function tryUrl(u) { $('urlInput').value = u; analyze(); }

function toggleCompare() {
  _compareMode = !_compareMode;
  $('compareToggle').classList.toggle('active', _compareMode);
  $('competitorRow').classList.toggle('visible', _compareMode);
  if (_compareMode) $('competitorInput').focus();
}

async function fetchAnalysis(url) {
  const r = await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'שגיאה בניתוח');
  return d;
}

async function analyze() {
  const raw = $('urlInput').value.trim();
  if (!raw) return;
  const url = raw.match(/^https?:\/\//) ? raw : 'https://' + raw;

  const compRaw = _compareMode ? $('competitorInput').value.trim() : '';
  const compUrl = compRaw ? (compRaw.match(/^https?:\/\//) ? compRaw : 'https://' + compRaw) : '';

  show('loading'); hide('errorBox'); hide('results');
  $('analyzeBtn').disabled = true;
  $('loading').querySelector('p').textContent = _compareMode && compUrl ? 'מנתח את שני האתרים...' : 'מנתח את האתר...';

  try {
    let mainData, compData = null;
    if (_compareMode && compUrl) {
      [mainData, compData] = await Promise.all([fetchAnalysis(url), fetchAnalysis(compUrl)]);
    } else {
      mainData = await fetchAnalysis(url);
    }
    _competitorData = compData;
    render(mainData);
    show('results');
  } catch (e) {
    $('errorBox').textContent = e.message;
    show('errorBox');
  } finally {
    hide('loading');
    $('analyzeBtn').disabled = false;
  }
}

$('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
$('competitorInput').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

function show(id) { $(id).classList.add('active'); }
function hide(id) { $(id).classList.remove('active'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function trunc(s, n) { return !s ? '' : s.length > n ? s.slice(0, n) + '...' : s; }
function clr(p) { return p >= 75 ? 'var(--green)' : p >= 45 ? 'var(--yellow)' : 'var(--red)'; }

let _lastData = null; // store last analysis for export

/* ── Render ── */
function render(d) {
  _lastData = d;
  const s = d.scores;
  const ai = d.aiSignals;
  const aiHealth = Math.max(0, 100 - ai.score);
  const secPct = d.security.isHttps ? (d.security.hsts ? 95 : 65) : 15;
  const accPct = d.accessibility.score;

  // URL bar
  $('urlBar').innerHTML = `
    <span class="url">${esc(d.url)}</span>
    <span class="badge ${d.statusCode === 200 ? 'badge-green' : 'badge-red'}">${d.statusCode}</span>
    <span class="badge badge-gray">${d.fetchTime} ms</span>
    <span class="badge badge-gray">${d.performance.htmlSizeKB} KB</span>
    <span class="badge badge-gray">${d.content.wordCount} מילים</span>`;

  // Score rings
  $('scoreRow').innerHTML = [
    ring(s.percentage, 'ציון SEO', gradeHe(s.percentage)),
    ring(aiHealth, 'בריאות AI', { low: 'תקין', medium: 'נדרשת בדיקה', high: 'חשוד' }[ai.level]),
    ring(secPct, 'אבטחה', d.security.isHttps ? 'HTTPS' : 'חסר HTTPS'),
    ring(accPct, 'נגישות', accPct >= 80 ? 'טוב' : accPct >= 50 ? 'בינוני' : 'דורש שיפור'),
  ].join('');

  // Tabs
  const tabs = [
    { id: 'overview', label: 'סקירה כללית' },
    { id: 'ai', label: 'אבחון AI' },
    { id: 'meta', label: 'מטא ותוכן' },
    { id: 'technical', label: 'טכני' },
    { id: 'checks', label: 'בדיקות' },
  ];
  if (_competitorData) tabs.splice(1, 0, { id: 'compare', label: 'השוואת מתחרים' });

  $('tabsBar').innerHTML = tabs.map((t, i) =>
    `<button class="tab-btn${i === 0 ? ' active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');

  // Panels
  let html = '';

  // Overview
  html += `<div class="tab-panel active" id="panel-overview">
    ${renderRecs(d)}
    <div class="grid2">
      ${renderCategoryCard(s)}
      ${renderQuickStats(d)}
    </div>
  </div>`;

  // Compare
  if (_competitorData) {
    html += `<div class="tab-panel" id="panel-compare">${renderCompare(d, _competitorData)}</div>`;
  }

  // AI
  html += `<div class="tab-panel" id="panel-ai">${renderAI(d)}</div>`;

  // Meta & Content
  html += `<div class="tab-panel" id="panel-meta">${renderMeta(d)}</div>`;

  // Technical
  html += `<div class="tab-panel" id="panel-technical">${renderTechnical(d)}</div>`;

  // Checks
  html += `<div class="tab-panel" id="panel-checks">${renderChecks(d)}</div>`;

  $('panels').innerHTML = html;
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${id}')"]`).classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function gradeHe(p) { return p >= 90 ? 'מצוין' : p >= 75 ? 'טוב' : p >= 50 ? 'בינוני' : p >= 30 ? 'חלש' : 'דורש שיפור'; }

function ring(pct, label, sub) {
  const c = clr(pct);
  const circ = 2 * Math.PI * 48;
  const off = circ - (pct / 100) * circ;
  return `<div class="score-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 108 108"><circle class="ring-bg" cx="54" cy="54" r="48"/><circle class="ring-fg" cx="54" cy="54" r="48" stroke="${c}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg>
      <div class="ring-val" style="color:${c}">${pct}<small>%</small></div>
    </div>
    <div class="score-label">${label}</div>
    <div class="score-sub">${sub}</div>
  </div>`;
}

/* ── Recommendations ── */
function renderRecs(d) {
  const recs = [];
  for (const c of d.scores.checks) {
    if (c.score < c.max) {
      const pr = c.score === 0 ? 'h' : (c.score / c.max) < 0.6 ? 'm' : 'l';
      recs.push({ pr, text: `<strong>${c.name}:</strong> ${c.tip}` });
    }
  }
  if (d.aiSignals.level === 'high') recs.unshift({ pr: 'h', text: '<strong>תוכן AI:</strong> זוהו סימנים משמעותיים לתוכן שנוצר ע"י AI — שכתב תוכן בצורה ייחודית' });
  else if (d.aiSignals.level === 'medium') recs.push({ pr: 'm', text: '<strong>תוכן AI:</strong> נמצאו מספר סימנים — סקור וגוון את הכתיבה' });

  recs.sort((a, b) => ({ h: 0, m: 1, l: 2 }[a.pr] - { h: 0, m: 1, l: 2 }[b.pr]));
  if (!recs.length) return '';

  const prHe = { h: 'קריטי', m: 'בינוני', l: 'נמוך' };
  return `<div class="recs-card" style="margin-bottom:20px">
    <div class="recs-title">💡 ${recs.length} המלצות לשיפור</div>
    ${recs.map(r => `<div class="rec"><span class="rec-pr pr-${r.pr}">${prHe[r.pr]}</span><span>${r.text}</span></div>`).join('')}
  </div>`;
}

/* ── Category card ── */
function renderCategoryCard(s) {
  const catNames = { meta: 'מטא תגיות', content: 'תוכן', technical: 'טכני', security: 'אבטחה', social: 'רשתות חברתיות', performance: 'ביצועים', accessibility: 'נגישות' };
  let rows = '';
  for (const [key, v] of Object.entries(s.categories)) {
    const pct = Math.round((v.score / v.max) * 100);
    rows += `<div class="row"><span class="row-label">${catNames[key] || key}</span><span class="row-value" style="color:${clr(pct)}">${v.score}/${v.max} (${pct}%)</span></div>`;
  }
  return `<div class="card"><div class="card-head"><div class="card-ico" style="background:var(--purple-bg);color:var(--purple)">📊</div><div class="card-title">ציונים לפי קטגוריה</div></div>${rows}</div>`;

/* ── Checks ── */
function renderChecks(d) {
  const s = d.scores;
  let h = `<div class="card"><div class="card-head"><div class="card-ico" style="background:var(--green-bg);color:var(--green)">✅</div><div class="card-title">כל הבדיקות (${s.total}/${s.max} נקודות — ${s.percentage}%)</div></div>`;

  for (const c of s.checks) {
    const pct = c.score / c.max;
    const dotCls = pct >= 0.8 ? 'dot-pass' : pct > 0 ? 'dot-partial' : 'dot-fail';
    h += `<div class="check">
      <div class="check-dot ${dotCls}"></div>
      <div class="check-info"><div class="check-name">${esc(c.name)}</div><div class="check-tip">${esc(c.tip)}</div></div>
      <div class="check-pts" style="color:${clr(pct * 100)}">${c.score}/${c.max}</div>
    </div>`;
  }

  h += '</div>';
  return h;
}

/* ══════════════════════════════════════════
   COMPETITOR COMPARISON
   ══════════════════════════════════════════ */

function renderCompare(a, b) {
  const hostA = new URL(a.url).hostname;
  const hostB = new URL(b.url).hostname;
  const aiHealthA = Math.max(0, 100 - a.aiSignals.score);
  const aiHealthB = Math.max(0, 100 - b.aiSignals.score);
  const secA = a.security.isHttps ? (a.security.hsts ? 95 : 65) : 15;
  const secB = b.security.isHttps ? (b.security.hsts ? 95 : 65) : 15;

  const metrics = [
    { label: 'ציון SEO כללי', a: a.scores.percentage, b: b.scores.percentage, unit: '%', higher: true },
    { label: 'בריאות AI', a: aiHealthA, b: aiHealthB, unit: '%', higher: true },
    { label: 'אבטחה', a: secA, b: secB, unit: '%', higher: true },
    { label: 'נגישות', a: a.accessibility.score, b: b.accessibility.score, unit: '%', higher: true },
    { label: 'מילים בדף', a: a.content.wordCount, b: b.content.wordCount, unit: '', higher: true },
    { label: 'פסקאות', a: a.content.paragraphCount, b: b.content.paragraphCount, unit: '', higher: true },
    { label: 'תמונות', a: a.images.total, b: b.images.total, unit: '', higher: true },
    { label: 'תמונות ללא alt', a: a.images.withoutAlt, b: b.images.withoutAlt, unit: '', higher: false },
    { label: 'קישורים פנימיים', a: a.links.internal, b: b.links.internal, unit: '', higher: true },
    { label: 'קישורים חיצוניים', a: a.links.external, b: b.links.external, unit: '', higher: true },
    { label: 'גודל HTML', a: a.performance.htmlSizeKB, b: b.performance.htmlSizeKB, unit: ' KB', higher: false },
    { label: 'זמן תגובה', a: a.fetchTime, b: b.fetchTime, unit: ' ms', higher: false },
    { label: 'סקריפטים', a: a.performance.scripts.total, b: b.performance.scripts.total, unit: '', higher: false },
    { label: 'נתונים מובנים', a: a.structuredData.length, b: b.structuredData.length, unit: '', higher: true },
  ];

  let winsA = 0, winsB = 0, ties = 0;
  metrics.forEach(m => {
    if (m.a === m.b) ties++;
    else if ((m.higher && m.a > m.b) || (!m.higher && m.a < m.b)) winsA++;
    else winsB++;
  });

  let h = `<div class="card" style="margin-bottom:20px">
    <div class="cmp-header">
      <span style="font-size:1.3rem">&#9878;</span>
      <span class="card-title" style="font-size:1.1rem">השוואת מתחרים</span>
    </div>
    <div style="display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:20px">
      <span class="cmp-site-badge cmp-site-a" dir="ltr">${esc(hostA)}</span>
      <span style="font-weight:800;color:var(--text3);font-size:1.1rem">VS</span>
      <span class="cmp-site-badge cmp-site-b" dir="ltr">${esc(hostB)}</span>
    </div>

    <table class="cmp-table">
      <thead><tr>
        <th>מדד</th>
        <th dir="ltr" style="text-align:center">${esc(hostA)}</th>
        <th dir="ltr" style="text-align:center">${esc(hostB)}</th>
        <th style="text-align:center">הפרש</th>
      </tr></thead>
      <tbody>`;

  for (const m of metrics) {
    const aWins = m.higher ? m.a > m.b : m.a < m.b;
    const bWins = m.higher ? m.b > m.a : m.b < m.a;
    const eq = m.a === m.b;
    const diff = m.a - m.b;
    const absDiff = Math.abs(diff);

    let deltaHtml;
    if (eq) {
      deltaHtml = `<span class="cmp-delta cmp-delta-eq">שווה</span>`;
    } else if (aWins) {
      deltaHtml = `<span class="cmp-delta cmp-delta-pos">+${absDiff}${m.unit}</span>`;
    } else {
      deltaHtml = `<span class="cmp-delta cmp-delta-neg">-${absDiff}${m.unit}</span>`;
    }

    const maxVal = Math.max(m.a, m.b, 1);
    const barAW = Math.round((m.a / maxVal) * 100);
    const barBW = Math.round((m.b / maxVal) * 100);

    h += `<tr>
      <td class="cmp-label">${m.label}</td>
      <td style="text-align:center;${aWins ? 'font-weight:700;color:var(--green)' : ''}" dir="ltr">
        <div class="cmp-bar-wrap" style="justify-content:center">
          <div class="cmp-bar cmp-bar-a" style="width:${barAW}%;min-width:4px;max-width:80px"></div>
          <span>${m.a}${m.unit}</span>
        </div>
      </td>
      <td style="text-align:center;${bWins ? 'font-weight:700;color:var(--green)' : ''}" dir="ltr">
        <div class="cmp-bar-wrap" style="justify-content:center">
          <div class="cmp-bar cmp-bar-b" style="width:${barBW}%;min-width:4px;max-width:80px"></div>
          <span>${m.b}${m.unit}</span>
        </div>
      </td>
      <td style="text-align:center">${deltaHtml}</td>
    </tr>`;
  }

  h += '</tbody></table>';

  // Category comparison
  const catNames = { meta: 'מטא תגיות', content: 'תוכן', technical: 'טכני', security: 'אבטחה', social: 'רשתות חברתיות', performance: 'ביצועים', accessibility: 'נגישות' };
  h += `<div style="margin-top:16px"><strong style="font-size:.95rem">ציונים לפי קטגוריה:</strong></div>
  <table class="cmp-table" style="margin-top:8px"><thead><tr><th>קטגוריה</th><th style="text-align:center" dir="ltr">${esc(hostA)}</th><th style="text-align:center" dir="ltr">${esc(hostB)}</th></tr></thead><tbody>`;

  for (const [key, va] of Object.entries(a.scores.categories)) {
    const vb = b.scores.categories[key];
    if (!vb) continue;
    const pctA = Math.round((va.score / va.max) * 100);
    const pctB = Math.round((vb.score / vb.max) * 100);
    h += `<tr>
      <td class="cmp-label">${catNames[key] || key}</td>
      <td style="text-align:center;font-weight:600;color:${pClr(pctA)}">${pctA}%</td>
      <td style="text-align:center;font-weight:600;color:${pClr(pctB)}">${pctB}%</td>
    </tr>`;
  }
  h += '</tbody></table>';

  // Verdict
  const winner = winsA > winsB ? hostA : winsB > winsA ? hostB : null;
  const verdictText = winner
    ? `<strong>${esc(winner)}</strong> מוביל ב-<strong>${Math.max(winsA, winsB)}</strong> מדדים מתוך ${metrics.length}. ${esc(winner === hostA ? hostB : hostA)} מוביל ב-${Math.min(winsA, winsB)} מדדים. ${ties} מדדים שווים.`
    : `שני האתרים שווים! כל אחד מוביל ב-${winsA} מדדים עם ${ties} שוויונות.`;

  h += `<div class="cmp-verdict">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:1.2rem">&#127942;</span><strong style="font-size:1rem">סיכום ההשוואה</strong></div>
    <p>${verdictText}</p>
  </div>`;

  // Insights - what competitor does better
  h += renderCompareInsights(a, b, hostA, hostB);

  h += '</div>';
  return h;
}

/* ── Competitor insights ── */
function renderCompareInsights(a, b, hostA, hostB) {
  const insights = [];

  // Title
  if (a.meta.title && b.meta.title) {
    const aLen = a.meta.title.length;
    const bLen = b.meta.title.length;
    const aGood = aLen >= 30 && aLen <= 60;
    const bGood = bLen >= 30 && bLen <= 60;
    if (!aGood && bGood) {
      insights.push({
        icon: '🏷', iconBg: 'var(--purple-bg)', iconColor: 'var(--purple)',
        title: 'כותרת (Title) טובה יותר אצל המתחרה',
        priority: 'high',
        body: `למתחרה <strong>${esc(hostB)}</strong> כותרת באורך אופטימלי (${bLen} תווים) בעוד שלך ${aLen} תווים.`,
        example: `המתחרה: <code>${esc(b.meta.title)}</code><br>שלך: <code>${esc(a.meta.title)}</code><br><strong>טיפ:</strong> כתוב כותרת בין 30-60 תווים הכוללת מילת מפתח ראשית.`,
      });
    }
  } else if (!a.meta.title && b.meta.title) {
    insights.push({
      icon: '🏷', iconBg: 'var(--red-bg)', iconColor: 'var(--red)',
      title: 'חסרה תגית כותרת — למתחרה יש',
      priority: 'high',
      body: `לאתר שלך אין תגית title בכלל, בעוד שלמתחרה יש כותרת מוגדרת.`,
      example: `המתחרה: <code>${esc(b.meta.title)}</code><br><strong>טיפ:</strong> הוסף <code>&lt;title&gt;</code> עם מילות מפתח ממוקדות.`,
    });
  }

  // Meta description
  if (b.meta.metaDescription && !a.meta.metaDescription) {
    insights.push({
      icon: '📝', iconBg: 'var(--red-bg)', iconColor: 'var(--red)',
      title: 'חסר תיאור מטא — למתחרה יש',
      priority: 'high',
      body: `למתחרה יש meta description שמופיע בתוצאות החיפוש, לך אין.`,
      example: `המתחרה: <code>${esc(b.meta.metaDescription.substring(0, 100))}...</code><br><strong>טיפ:</strong> כתוב תיאור של 120-160 תווים עם קריאה לפעולה.`,
    });
  } else if (a.meta.metaDescription && b.meta.metaDescription) {
    const aLen = a.meta.metaDescription.length;
    const bLen = b.meta.metaDescription.length;
    const aGood = aLen >= 120 && aLen <= 160;
    const bGood = bLen >= 120 && bLen <= 160;
    if (!aGood && bGood) {
      insights.push({
        icon: '📝', iconBg: 'var(--purple-bg)', iconColor: 'var(--purple)',
        title: 'תיאור מטא טוב יותר אצל המתחרה',
        priority: 'medium',
        body: `למתחרה תיאור באורך אופטימלי (${bLen} תווים) בעוד שלך ${aLen} תווים.`,
        example: `המתחרה: <code>${esc(b.meta.metaDescription.substring(0, 80))}...</code><br><strong>טיפ:</strong> שפר את התיאור ל-120-160 תווים.`,
      });
    }
  }

  // H1
  const aH1 = a.headings.h1.count;
  const bH1 = b.headings.h1.count;
  if (aH1 !== 1 && bH1 === 1) {
    insights.push({
      icon: '📑', iconBg: 'var(--green-bg)', iconColor: 'var(--green)',
      title: 'מבנה H1 נכון אצל המתחרה',
      priority: aH1 === 0 ? 'high' : 'medium',
      body: aH1 === 0
        ? `למתחרה יש תגית H1 אחת כנדרש, לך אין H1 בכלל.`
        : `למתחרה יש H1 יחיד כנדרש, לך יש ${aH1} תגיות H1.`,
      example: `המתחרה: <code>&lt;h1&gt;${esc(b.headings.h1.samples[0] || '')}&lt;/h1&gt;</code><br><strong>טיפ:</strong> השתמש ב-H1 יחיד שמתאר את תוכן הדף.`,
    });
  }

  // Structured data
  if (a.structuredData.length === 0 && b.structuredData.length > 0) {
    insights.push({
      icon: '📊', iconBg: 'var(--blue-bg)', iconColor: 'var(--blue)',
      title: 'למתחרה יש נתונים מובנים (Schema)',
      priority: 'high',
      body: `למתחרה יש ${b.structuredData.length} סוגי Schema: <strong>${b.structuredData.join(', ')}</strong>. לך אין בכלל.`,
      example: `<strong>טיפ:</strong> הוסף JSON-LD עם <code>@type</code> מתאים. נתונים מובנים מסייעים ל-Rich Snippets בגוגל ומגדילים CTR בעד 30%.`,
    });
  }

  // Open Graph
  const aOG = Object.keys(a.openGraph).length;
  const bOG = Object.keys(b.openGraph).length;
  if (aOG < 3 && bOG >= 3) {
    const bOGTags = Object.entries(b.openGraph).slice(0, 4).map(([k, v]) => `og:${k}="${v.substring(0, 40)}"`).join(', ');
    insights.push({
      icon: '📢', iconBg: 'var(--purple-bg)', iconColor: 'var(--purple)',
      title: 'למתחרה תגיות Open Graph טובות יותר',
      priority: 'medium',
      body: `למתחרה ${bOG} תגיות OG, לך ${aOG || 'אין'}. OG משפיע על איך האתר נראה בשיתוף ברשתות חברתיות.`,
      example: `המתחרה: <code>${esc(bOGTags)}</code><br><strong>טיפ:</strong> הוסף לפחות og:title, og:description, og:image, og:url.`,
    });
  }

  // Twitter Card
  const aTW = Object.keys(a.twitterCard).length;
  const bTW = Object.keys(b.twitterCard).length;
  if (aTW === 0 && bTW >= 2) {
    insights.push({
      icon: '🐦', iconBg: 'var(--blue-bg)', iconColor: 'var(--blue)',
      title: 'למתחרה תגיות Twitter Card',
      priority: 'low',
      body: `למתחרה ${bTW} תגיות Twitter Card, לך אין. זה משפיע על תצוגת הקישורים בטוויטר/X.`,
      example: `<strong>טיפ:</strong> הוסף <code>twitter:card</code>, <code>twitter:title</code>, <code>twitter:description</code>.`,
    });
  }

  // HTTPS
  if (!a.security.isHttps && b.security.isHttps) {
    insights.push({
      icon: '🔒', iconBg: 'var(--red-bg)', iconColor: 'var(--red)',
      title: 'המתחרה משתמש ב-HTTPS, אתה לא',
      priority: 'high',
      body: `HTTPS הוא גורם דירוג של גוגל. המתחרה מאובטח, אתה לא.`,
      example: `<strong>טיפ:</strong> התקן תעודת SSL (חינם ב-Let's Encrypt) והפנה את כל התעבורה ל-HTTPS.`,
    });
  }

  // HSTS
  if (!a.security.hsts && b.security.hsts) {
    insights.push({
      icon: '🛡', iconBg: 'var(--yellow-bg)', iconColor: 'var(--yellow)',
      title: 'למתחרה יש HSTS, לך אין',
      priority: 'low',
      body: `HSTS מבטיח שהדפדפן תמיד יגש באמצעות HTTPS. המתחרה הפעיל את זה.`,
      example: `<strong>טיפ:</strong> הוסף header: <code>Strict-Transport-Security: max-age=31536000</code>`,
    });
  }

  // Canonical
  if (!a.meta.canonical && b.meta.canonical) {
    insights.push({
      icon: '🔗', iconBg: 'var(--yellow-bg)', iconColor: 'var(--yellow)',
      title: 'למתחרה יש Canonical URL',
      priority: 'medium',
      body: `Canonical URL מונע תוכן כפול בגוגל. למתחרה מוגדר, לך לא.`,
      example: `המתחרה: <code>&lt;link rel="canonical" href="${esc(b.meta.canonical.substring(0, 60))}"&gt;</code><br><strong>טיפ:</strong> הוסף canonical לכל דף כדי למנוע אינדוקס כפול.`,
    });
  }

  // Images alt
  if (a.images.withoutAlt > 0 && b.images.withoutAlt === 0 && b.images.total > 0) {
    insights.push({
      icon: '🖼', iconBg: 'var(--yellow-bg)', iconColor: 'var(--yellow)',
      title: 'למתחרה alt text לכל התמונות',
      priority: 'medium',
      body: `יש לך ${a.images.withoutAlt} תמונות ללא טקסט חלופי. למתחרה כל ${b.images.total} התמונות עם alt.`,
      example: `<strong>טיפ:</strong> הוסף <code>alt="תיאור התמונה"</code> לכל תמונה. זה חשוב לנגישות ול-SEO תמונות.`,
    });
  }

  // Word count
  if (a.content.wordCount < 300 && b.content.wordCount >= 300) {
    insights.push({
      icon: '📄', iconBg: 'var(--blue-bg)', iconColor: 'var(--blue)',
      title: 'למתחרה יותר תוכן',
      priority: 'medium',
      body: `יש לך ${a.content.wordCount} מילים בלבד, למתחרה ${b.content.wordCount}. גוגל מעדיף תוכן מעמיק.`,
      example: `<strong>טיפ:</strong> הוסף תוכן איכותי — מומלץ לפחות 300 מילים לדף, ו-1000+ לדפי תוכן מרכזיים.`,
    });
  }

  // Language
  if (!a.meta.lang && b.meta.lang) {
    insights.push({
      icon: '🌐', iconBg: 'var(--blue-bg)', iconColor: 'var(--blue)',
      title: 'למתחרה מוגדרת שפת הדף',
      priority: 'low',
      body: `למתחרה מוגדר <code>lang="${esc(b.meta.lang)}"</code>, לך חסר. זה עוזר לגוגל ולקוראי מסך.`,
      example: `<strong>טיפ:</strong> הוסף <code>&lt;html lang="he"&gt;</code> (או שפה מתאימה) לתגית html.`,
    });
  }

  // AI health
  const aiA = a.aiSignals.score;
  const aiB = b.aiSignals.score;
  if (aiA > 40 && aiB < 20) {
    insights.push({
      icon: '🤖', iconBg: 'var(--red-bg)', iconColor: 'var(--red)',
      title: 'התוכן שלך נראה "AI יותר" מהמתחרה',
      priority: 'high',
      body: `ציון AI שלך: ${aiA}/100, המתחרה: ${aiB}/100. גוגל עשוי להעניש תוכן שנראה מיוצר אוטומטית.`,
      example: `<strong>טיפ:</strong> שכתב תוכן עם סגנון אישי, הוסף דוגמאות ספציפיות, חוויות אישיות, ונתונים ייחודיים.`,
    });
  }

  // Response time
  if (a.fetchTime > 2000 && b.fetchTime < 1000) {
    insights.push({
      icon: '⚡', iconBg: 'var(--yellow-bg)', iconColor: 'var(--yellow)',
      title: 'המתחרה מהיר יותר ממך',
      priority: 'medium',
      body: `זמן תגובה שלך: ${a.fetchTime}ms, המתחרה: ${b.fetchTime}ms. מהירות היא גורם דירוג.`,
      example: `<strong>טיפ:</strong> אופטימיזציה: דחיסת תמונות, CDN, caching, הקטנת JS/CSS.`,
    });
  }

  if (insights.length === 0) {
    return `<div class="cmp-insights"><div class="cmp-insights-title">💪 מצוין!</div><p style="color:var(--text2)">לא נמצאו נקודות בולטות שבהן המתחרה עושה טוב יותר ממך. המשך כך!</p></div>`;
  }

  const prColors = { high: { bg: 'var(--red-bg)', c: 'var(--red)', label: 'קריטי' }, medium: { bg: 'var(--yellow-bg)', c: 'var(--yellow)', label: 'בינוני' }, low: { bg: 'var(--blue-bg)', c: 'var(--blue)', label: 'נמוך' } };
  insights.sort((x, y) => ({ high: 0, medium: 1, low: 2 }[x.priority] - { high: 0, medium: 1, low: 2 }[y.priority]));

  let h = `<div class="cmp-insights">
    <div class="cmp-insights-title">📚 מה המתחרה עושה טוב יותר? (${insights.length} תובנות)</div>`;

  for (const ins of insights) {
    const pr = prColors[ins.priority];
    h += `<div class="insight-card">
      <div class="insight-head">
        <div class="insight-icon" style="background:${ins.iconBg};color:${ins.iconColor}">${ins.icon}</div>
        <span class="insight-title">${ins.title}</span>
        <span class="insight-tag" style="background:${pr.bg};color:${pr.c}">${pr.label}</span>
      </div>
      <div class="insight-body">
        <p>${ins.body}</p>
        <div class="insight-example">${ins.example}</div>
      </div>
    </div>`;
  }

  h += '</div>';
  return h;
}

function pClr(p) { return p >= 75 ? 'var(--green)' : p >= 45 ? 'var(--yellow)' : 'var(--red)'; }

/* ══════════════════════════════════════════
   EXPORT FUNCTIONS
   ══════════════════════════════════════════ */

/* ── Download JSON ── */
function downloadJSON() {
  if (!_lastData) return;
  const blob = new Blob([JSON.stringify(_lastData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const domain = new URL(_lastData.url).hostname.replace(/\./g, '_');
  a.download = `seo-report-${domain}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── Copy text summary ── */
function copyReport() {
  if (!_lastData) return;
  const d = _lastData;
  const ai = d.aiSignals;
  const lvlHe = { low: 'נמוך', medium: 'בינוני', high: 'גבוה' };

  let txt = `דוח SEO — ${d.url}\n`;
  txt += `תאריך: ${new Date().toLocaleDateString('he-IL')}\n`;
  txt += `${'─'.repeat(40)}\n\n`;
  txt += `ציון SEO כללי: ${d.scores.percentage}% (${d.scores.total}/${d.scores.max})\n`;
  txt += `בריאות AI: ${Math.max(0, 100 - ai.score)}% | רמת סיכון: ${lvlHe[ai.level]}\n`;
  txt += `אבטחה: ${d.security.isHttps ? 'HTTPS' : 'חסר HTTPS'}\n`;
  txt += `נגישות: ${d.accessibility.score}%\n\n`;

  txt += `סטטיסטיקות:\n`;
  txt += `  מילים: ${d.content.wordCount} | פסקאות: ${d.content.paragraphCount}\n`;
  txt += `  תמונות: ${d.images.total} (${d.images.withoutAlt} ללא alt)\n`;
  txt += `  קישורים: ${d.links.total} (${d.links.internal} פנימי, ${d.links.external} חיצוני)\n\n`;

  txt += `בדיקות:\n`;
  for (const c of d.scores.checks) {
    const icon = c.score === c.max ? '+' : c.score === 0 ? '!' : '~';
    txt += `  [${icon}] ${c.name}: ${c.tip} (${c.score}/${c.max})\n`;
  }

  if (ai.signals.length) {
    txt += `\nסימני AI:\n`;
    for (const s of ai.signals) {
      txt += `  - ${s.label}${s.count ? ` (x${s.count})` : ''}\n`;
    }
  }

  txt += `\n${'─'.repeat(40)}\nנוצר ע"י SEO AI Analyzer`;

  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('[onclick="copyReport()"]');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg> הועתק!';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
  });
}

/* ── Generate PDF Report (print-ready HTML) ── */
function generateReport() {
  if (!_lastData) return;
  const d = _lastData;
  const s = d.scores;
  const ai = d.aiSignals;
  const aiHealth = Math.max(0, 100 - ai.score);
  const secPct = d.security.isHttps ? (d.security.hsts ? 95 : 65) : 15;
  const accPct = d.accessibility.score;
  const lvlHe = { low: 'נמוך', medium: 'בינוני', high: 'גבוה' };
  const catNames = { meta: 'מטא תגיות', content: 'תוכן', technical: 'טכני', security: 'אבטחה', social: 'רשתות חברתיות', performance: 'ביצועים', accessibility: 'נגישות' };
  const now = new Date();
  const dateStr = now.toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' });
  const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });

  function pClr(p) { return p >= 75 ? '#10b981' : p >= 45 ? '#f59e0b' : '#ef4444'; }
  function pBg(p) { return p >= 75 ? '#ecfdf5' : p >= 45 ? '#fffbeb' : '#fef2f2'; }

  function svgRing(pct, label, sub, size = 90) {
    const c = pClr(pct);
    const r = size * 0.38;
    const circ = 2 * Math.PI * r;
    const off = circ - (pct / 100) * circ;
    return `<div style="text-align:center;flex:1;min-width:120px">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="5"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/>
      </svg>
      <div style="margin-top:-${size*0.62}px;margin-bottom:${size*0.22}px;font-size:${size*0.22}px;font-weight:800;color:${c}">${pct}%</div>
      <div style="font-weight:700;font-size:11px;margin-top:4px">${label}</div>
      <div style="font-size:10px;color:#6b7280">${sub}</div>
    </div>`;
  }

  let checksHtml = '';
  for (const c of s.checks) {
    const pct = c.score / c.max;
    const dotColor = pct >= 0.8 ? '#10b981' : pct > 0 ? '#f59e0b' : '#ef4444';
    checksHtml += `<tr>
      <td style="padding:6px 10px;border-bottom:1px solid #f0f0f0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};margin-left:6px"></span> ${esc(c.name)}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;color:#6b7280;font-size:12px">${esc(c.tip)}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;font-weight:700;color:${dotColor};text-align:center;direction:ltr">${c.score}/${c.max}</td>
    </tr>`;
  }

  let recsHtml = '';
  const recs = [];
  for (const c of s.checks) {
    if (c.score < c.max) {
      const pr = c.score === 0 ? 'high' : (c.score / c.max) < 0.6 ? 'medium' : 'low';
      recs.push({ pr, name: c.name, tip: c.tip });
    }
  }
  if (ai.level === 'high') recs.unshift({ pr: 'high', name: 'תוכן AI', tip: 'זוהו סימנים משמעותיים לתוכן AI — שכתב בצורה ייחודית' });
  else if (ai.level === 'medium') recs.push({ pr: 'medium', name: 'תוכן AI', tip: 'נמצאו סימנים — סקור וגוון את הכתיבה' });
  recs.sort((a, b) => ({ high: 0, medium: 1, low: 2 }[a.pr] - { high: 0, medium: 1, low: 2 }[b.pr]));

  const prColors = { high: { bg: '#fef2f2', c: '#ef4444', label: 'קריטי' }, medium: { bg: '#fffbeb', c: '#f59e0b', label: 'בינוני' }, low: { bg: '#eff6ff', c: '#3b82f6', label: 'נמוך' } };
  for (const r of recs) {
    const p = prColors[r.pr];
    recsHtml += `<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 12px;background:${p.bg};border-radius:8px;margin-bottom:5px;font-size:12px">
      <span style="background:${p.c};color:#fff;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;margin-top:1px">${p.label}</span>
      <span><strong>${esc(r.name)}:</strong> ${esc(r.tip)}</span>
    </div>`;
  }

  let aiSignalsHtml = '';
  if (ai.signals.length) {
    for (const sig of ai.signals) {
      const sigBg = sig.severity === 'warning' ? '#fffbeb' : '#eff6ff';
      const sigC = sig.severity === 'warning' ? '#f59e0b' : '#3b82f6';
      aiSignalsHtml += `<div style="display:flex;gap:8px;align-items:center;padding:6px 10px;background:${sigBg};border-radius:6px;margin-bottom:4px;font-size:12px">
        <span style="flex:1">${esc(sig.label)}</span>
        ${sig.count ? `<span style="color:#9ca3af;font-size:11px">x${sig.count}</span>` : ''}
        <span style="color:${sigC};font-size:10px;font-weight:600">${sig.severity === 'warning' ? 'אזהרה' : 'מידע'}</span>
      </div>`;
    }
  } else {
    aiSignalsHtml = '<p style="color:#6b7280;font-size:12px;padding:8px 0">לא זוהו סימנים משמעותיים לתוכן AI.</p>';
  }

  let catHtml = '';
  for (const [key, v] of Object.entries(s.categories)) {
    const pct = Math.round((v.score / v.max) * 100);
    catHtml += `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px">
      <span>${catNames[key] || key}</span>
      <span style="font-weight:700;color:${pClr(pct)}">${v.score}/${v.max} (${pct}%)</span>
    </div>`;
  }

  const reportHTML = `<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>דוח SEO — ${esc(new URL(d.url).hostname)}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Heebo', sans-serif; color: #1f2937; line-height: 1.6; background: #fff; padding: 0; }
    @page { size: A4; margin: 15mm 12mm; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .page-break { page-break-before: always; }
      .no-print { display: none; }
    }
    .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; padding: 28px 32px; border-radius: 0 0 16px 16px; margin-bottom: 24px; }
    .header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .header-meta { display: flex; gap: 16px; font-size: 12px; opacity: .85; flex-wrap: wrap; }
    .section { margin-bottom: 22px; padding: 0 8px; }
    .section-title { font-size: 15px; font-weight: 700; color: #4f46e5; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .scores-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; padding: 16px; background: #fafafa; border-radius: 12px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .info-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
    .info-box h3 { font-size: 12px; font-weight: 700; color: #6366f1; margin-bottom: 8px; }
    .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
    .info-row:last-child { border: none; }
    .info-row .label { color: #6b7280; }
    .info-row .val { font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    table th { text-align: right; padding: 8px 10px; background: #f9fafb; border-bottom: 2px solid #e5e7eb; font-weight: 600; color: #6b7280; font-size: 11px; }
    .footer-report { text-align: center; padding: 16px; color: #9ca3af; font-size: 11px; border-top: 1px solid #e5e7eb; margin-top: 20px; }
    .print-bar { position: fixed; top: 0; left: 0; right: 0; background: #4f46e5; color: #fff; padding: 10px 20px; display: flex; justify-content: center; gap: 12px; z-index: 999; }
    .print-bar button { padding: 8px 24px; border: 2px solid #fff; background: transparent; color: #fff; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .print-bar button:hover { background: rgba(255,255,255,.15); }
    .print-bar button.primary { background: #fff; color: #4f46e5; }
  </style>
</head>
<body>
  <div class="print-bar no-print">
    <button class="primary" onclick="window.print()">הדפס / שמור כ-PDF</button>
    <button onclick="window.close()">סגור</button>
  </div>

  <div style="padding-top:50px">
  <div class="header">
    <h1>דוח ניתוח SEO ואבחון AI</h1>
    <div class="header-meta">
      <span>אתר: ${esc(d.url)}</span>
      <span>תאריך: ${dateStr} ${timeStr}</span>
      <span>סטטוס: ${d.statusCode}</span>
      <span>זמן תגובה: ${d.fetchTime}ms</span>
    </div>
  </div>

  <!-- Scores -->
  <div class="section">
    <div class="scores-row">
      ${svgRing(s.percentage, 'ציון SEO', gradeHe(s.percentage))}
      ${svgRing(aiHealth, 'בריאות AI', lvlHe[ai.level])}
      ${svgRing(secPct, 'אבטחה', d.security.isHttps ? 'HTTPS' : 'חסר')}
      ${svgRing(accPct, 'נגישות', accPct >= 80 ? 'טוב' : accPct >= 50 ? 'בינוני' : 'חלש')}
    </div>
  </div>

  <!-- Recommendations -->
  ${recs.length ? `<div class="section">
    <div class="section-title">💡 המלצות לשיפור (${recs.length})</div>
    ${recsHtml}
  </div>` : ''}

  <!-- Category scores + Quick stats -->
  <div class="section">
    <div class="info-grid">
      <div class="info-box">
        <h3>ציונים לפי קטגוריה</h3>
        ${catHtml}
      </div>
      <div class="info-box">
        <h3>סטטיסטיקות</h3>
        <div class="info-row"><span class="label">מילים</span><span class="val">${d.content.wordCount}</span></div>
        <div class="info-row"><span class="label">פסקאות</span><span class="val">${d.content.paragraphCount}</span></div>
        <div class="info-row"><span class="label">תמונות</span><span class="val">${d.images.total} (${d.images.withoutAlt} ללא alt)</span></div>
        <div class="info-row"><span class="label">קישורים</span><span class="val">${d.links.total} (${d.links.internal} פנימי, ${d.links.external} חיצוני)</span></div>
        <div class="info-row"><span class="label">גודל HTML</span><span class="val">${d.performance.htmlSizeKB} KB</span></div>
        <div class="info-row"><span class="label">נתונים מובנים</span><span class="val">${d.structuredData.length ? d.structuredData.join(', ') : 'אין'}</span></div>
      </div>
    </div>
  </div>

  <!-- AI Diagnostics -->
  <div class="section">
    <div class="section-title">🤖 אבחון תוכן בינה מלאכותית — רמת סיכון: <span style="color:${pClr(aiHealth)};margin-right:4px">${lvlHe[ai.level]} (${ai.score}/100)</span></div>
    ${aiSignalsHtml}
  </div>

  <!-- Meta info -->
  <div class="section">
    <div class="info-grid">
      <div class="info-box">
        <h3>מטא תגיות</h3>
        <div class="info-row"><span class="label">כותרת</span><span class="val" dir="ltr">${esc(d.meta.title || '—')}</span></div>
        <div class="info-row"><span class="label">אורך כותרת</span><span class="val">${(d.meta.title||'').length} תווים</span></div>
        <div class="info-row"><span class="label">תיאור</span><span class="val" dir="ltr">${esc(trunc(d.meta.metaDescription, 60) || '—')}</span></div>
        <div class="info-row"><span class="label">אורך תיאור</span><span class="val">${(d.meta.metaDescription||'').length} תווים</span></div>
        <div class="info-row"><span class="label">Canonical</span><span class="val" dir="ltr">${esc(trunc(d.meta.canonical, 45) || '—')}</span></div>
        <div class="info-row"><span class="label">שפה</span><span class="val">${d.meta.lang || '—'}</span></div>
      </div>
      <div class="info-box">
        <h3>אבטחה וטכני</h3>
        <div class="info-row"><span class="label">HTTPS</span><span class="val" style="color:${d.security.isHttps ? '#10b981' : '#ef4444'}">${d.security.isHttps ? 'כן' : 'לא'}</span></div>
        <div class="info-row"><span class="label">HSTS</span><span class="val" style="color:${d.security.hsts ? '#10b981' : '#ef4444'}">${d.security.hsts ? 'מופעל' : 'לא'}</span></div>
        <div class="info-row"><span class="label">CSP</span><span class="val" style="color:${d.security.csp ? '#10b981' : '#ef4444'}">${d.security.csp ? 'מוגדר' : 'לא'}</span></div>
        <div class="info-row"><span class="label">X-Frame-Options</span><span class="val" dir="ltr">${esc(d.security.xFrameOptions || '—')}</span></div>
        <div class="info-row"><span class="label">Viewport</span><span class="val">${d.meta.viewport ? 'מוגדר' : 'חסר'}</span></div>
        <div class="info-row"><span class="label">קידוד</span><span class="val" dir="ltr">${d.meta.charset || '—'}</span></div>
      </div>
    </div>
  </div>

  <!-- All Checks table -->
  <div class="section page-break">
    <div class="section-title">✅ כל הבדיקות (${s.total}/${s.max} — ${s.percentage}%)</div>
    <table>
      <thead><tr><th>בדיקה</th><th>פירוט</th><th style="text-align:center">ציון</th></tr></thead>
      <tbody>${checksHtml}</tbody>
    </table>
  </div>

  <div class="footer-report">
    דוח זה נוצר אוטומטית ע"י SEO AI Analyzer | ${dateStr}
  </div>
  </div>
</body>
</html>`;

  const w = window.open('', '_blank');
  w.document.write(reportHTML);
  w.document.close();
}
</script>
</body>
</html>
